spring:
  # MySQL — question_db
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: validate          # PROD: never use 'update' — use Flyway/Liquibase migrations
    show-sql: false               # PROD: disable SQL logging (performance + log noise)
    properties:
      hibernate:
        format_sql: false

  # Redis — caching layer
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          min-idle: 2
          max-idle: 8
          max-active: 16

# Actuator — health probes for Kubernetes liveness/readiness
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true             # Exposes /actuator/health/liveness and /readiness
      show-details: never         # PROD: hide sensitive env/config details

# Downstream services
services:
  user-service:
    url: ${USER_SERVICE_URL}      # Injected via ConfigMap → http://user-service:8083