server:
  port: 8083

spring:
  application:
    name: question-service

  datasource:
    url: jdbc:mysql://localhost:3306/question_db
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Downstream services
services:
  user-service:
     url: ${USER_SERVICE_URL:http://localhost:8083}
#    url: ${USER_SERVICE_URL:http://user-service:8083}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka