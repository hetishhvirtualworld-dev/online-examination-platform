# Kubernetes manifest — Auth Service
# Mirrors API Gateway's Kubernetes config style

---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: exam-platform
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_SAME_SECRET_AS_GATEWAY"   # Must match gateway
  DB_URL: "jdbc:postgresql://postgres:5432/auth_db"
  DB_USERNAME: "auth_user"
  DB_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  REDIS_HOST: "redis-service"
  REDIS_PASSWORD: "REPLACE_WITH_REDIS_PASSWORD"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: exam-platform
data:
  JWT_ACCESS_EXPIRY_MS:  "900000"       # 15 minutes — matches Gateway's expectation
  JWT_REFRESH_EXPIRY_MS: "604800000"    # 7 days
  USER_SERVICE_URL:      "http://user-service:8082"
  RATE_LIMIT_MAX:        "5"
  RATE_LIMIT_WINDOW:     "900"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: exam-platform
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: auth-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: auth-service
          image: examplatform/auth-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_SECRET
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: REDIS_PASSWORD
          envFrom:
            - configMapRef:
                name: auth-service-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: exam-platform
spec:
  type: ClusterIP    # Internal only — accessed via Gateway
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081

---
# Gateway routes to auth-service — matches Gateway's application.yml
# /api/auth/** → auth-service:8081

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-netpol
  namespace: exam-platform
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway    # Only Gateway can call Auth Service
      ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: user-service
      ports:
        - protocol: TCP
          port: 8082
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to: []
      ports:
        - protocol: UDP
          port: 53

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  namespace: exam-platform
automountServiceAccountToken: false
