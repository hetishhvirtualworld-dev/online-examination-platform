# Kubernetes manifest — Auth Service
# Mirrors API Gateway's Kubernetes config style
# FIXED: See changelog at bottom for all changes

---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: exam-platform
type: Opaque
stringData:
  # FIX #1: Replace ALL placeholder values with references to your secrets manager
  # (e.g. External Secrets Operator, Sealed Secrets, or SOPS) before applying to prod.
  # Values below are intentionally left as placeholders — do NOT hardcode real secrets here.
  JWT_SECRET: "my-super-secret-key-for-prod-secret-key"           # Min 256-bit random key — openssl rand -base64 32
  DB_URL: "jdbc:mysql://mysql:3306/auth_db"
  DB_USERNAME: "root"         # FIX #3: Use a least-privilege DB user, not root
  DB_PASSWORD: "root"         # FIX #3: Strong password from secrets manager
  REDIS_HOST: "redis-service"
  REDIS_PASSWORD: ""   # FIX #7: Redis must require auth in prod

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: exam-platform
data:
  JWT_ACCESS_EXPIRY_MS:  "900000"       # 15 minutes — matches Gateway's expectation
  JWT_REFRESH_EXPIRY_MS: "604800000"    # 7 days
  USER_SERVICE_URL:      "http://user-service:8082"
  RATE_LIMIT_MAX:        "5"
  RATE_LIMIT_WINDOW:     "900"
  REDIS_PORT:            "6379"         # FIX #4: Added missing REDIS_PORT (was causing startup failure)
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"  # FIX #5: Added missing Kafka config

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: exam-platform
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: auth-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: auth-service
          # FIX #12: Pin to image digest in prod — replace tag with @sha256:<digest>
          image: hetishh/auth-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_SECRET
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: REDIS_PASSWORD
          envFrom:
            - configMapRef:
                name: auth-service-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # FIX #8: Added startupProbe to handle slow JVM boot gracefully
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            failureThreshold: 15
            periodSeconds: 5           # Allows up to 75s for JVM startup
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 5     # Reduced — startupProbe now handles initial delay
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 5     # Reduced — startupProbe now handles initial delay
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true   # FIX #11: Prevent writes to container filesystem
            capabilities:
              drop: [ALL]
          # FIX #11: Required writable mount points for JVM when readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: tmp-dir
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: exam-platform
spec:
  type: ClusterIP    # Internal only — accessed via Gateway
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081

---
# Gateway routes to auth-service — matches Gateway's application.yml
# /api/auth/** → auth-service:8081

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-netpol
  namespace: exam-platform
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway    # Only Gateway can call Auth Service
      ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: user-service
      ports:
        - protocol: TCP
          port: 8082
    # FIX #6: Corrected DB target from 'postgres:5432' to 'mysql:3306' to match DB_URL
    - to:
        - podSelector:
            matchLabels:
              app: mysql
      ports:
        - protocol: TCP
          port: 3306
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # FIX #5: Added Kafka egress to allow bootstrap server communication
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to: []
      ports:
        - protocol: UDP
          port: 53

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  namespace: exam-platform
automountServiceAccountToken: false

---
# FIX #9: Added PodDisruptionBudget to ensure availability during node drains
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  namespace: exam-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-service

